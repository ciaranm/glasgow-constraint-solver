name: CMake

on:
  push:
    branches: [ "main" ]
  # No base-branch filter here, so PRs onto a feature branch (a stacked PR, not
  # just onto main) are built and checked too.
  pull_request:

jobs:
  build:
    name: ${{ matrix.os }}${{ matrix.cxx && format(' ({0})', matrix.cxx) || '' }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        # The Ubuntu lanes with caps: OFF build with the runner's default GCC
        # and turn the constraint-test runtime caps off so they do
        # full-enumeration completeness checking. The clang lane covers the
        # clang + libstdc++ toolchain (including the clang-only lifetime
        # annotation probe tests) and keeps the (faster) capped defaults, as
        # do the macOS lanes, which build with Apple Clang + libc++.
        include:
          - { os: ubuntu-24.04, caps: 'OFF' }
          - { os: ubuntu-26.04, caps: 'OFF' }
          - { os: ubuntu-26.04, cc: clang, cxx: clang++ }
          - { os: macos-15 }
          - { os: macos-26 }

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Fetch VeriPB
      run: git -c core.hooksPath=/dev/null clone --depth 1 https://gitlab.com/MIAOresearch/software/VeriPB.git

    - name: Install VeriPB using cargo
      run: cargo install --path ./VeriPB

    - name: Install MiniZinc using brew
      run: brew install minizincide
      if: startsWith(matrix.os, 'macos')

    - name: Install MiniZinc bundle (Linux)
      # The Ubuntu runners have no MiniZinc package, so the MiniZinc tests used to
      # skip there. Download the official bundle (which ships the default gecode
      # solver the differential tests compare against) and put its bin dir on PATH,
      # mirroring the macOS brew install above. The bundle's fzn-gecode links Qt/GL
      # (gecode's Gist is compiled in), so pull in libEGL/libGL for the headless
      # runner -- without them fzn-gecode fails to load and every test errors.
      if: startsWith(matrix.os, 'ubuntu')
      run: |
        sudo apt-get update && sudo apt-get install -y libegl1 libgl1
        mkdir -p "$HOME/minizinc"
        curl -fsSL https://github.com/MiniZinc/MiniZincIDE/releases/download/2.9.7/MiniZincIDE-2.9.7-bundle-linux-x86_64.tgz \
          | tar xz -C "$HOME/minizinc" --strip-components=1
        mzn="$(find "$HOME/minizinc" -name minizinc -type f | head -1)"
        dirname "$mzn" >> "$GITHUB_PATH"
        "$mzn" --version

    - name: Install clang
      # Don't rely on the runner image preinstalling a particular clang; the
      # distro package is the version this lane is meant to cover.
      if: matrix.cxx == 'clang++'
      run: sudo apt-get update && sudo apt-get install -y clang

    - name: Configure CMake
      # An empty CC/CXX is ignored by CMake's compiler detection, so the
      # default-compiler lanes are unaffected.
      env:
        CC: ${{ matrix.cc }}
        CXX: ${{ matrix.cxx }}
      run: cmake --preset release -B ${{github.workspace}}/build ${{ matrix.caps == 'OFF' && '-DGCS_TEST_CAP_DEFAULTS=OFF' || '' }}

    - name: Build
      run: cmake --build ${{github.workspace}}/build --parallel $(nproc 2>/dev/null || sysctl -n hw.logicalcpu)

    - name: Test
      working-directory: ${{github.workspace}}/build
      run: ctest -j $(nproc 2>/dev/null || sysctl -n hw.logicalcpu) --output-on-failure --rerun-failed

  sanitize:
    name: Sanitize (ubuntu-26.04)
    runs-on: ubuntu-26.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Fetch VeriPB
      run: git -c core.hooksPath=/dev/null clone --depth 1 https://gitlab.com/MIAOresearch/software/VeriPB.git

    - name: Install VeriPB using cargo
      run: cargo install --path ./VeriPB

    - name: Configure CMake (Sanitize)
      run: cmake --preset sanitize -B ${{github.workspace}}/build-sanitize

    - name: Build (Sanitize)
      run: cmake --build ${{github.workspace}}/build-sanitize --parallel $(nproc 2>/dev/null || sysctl -n hw.logicalcpu)

    - name: Test (Sanitize)
      working-directory: ${{github.workspace}}/build-sanitize
      run: ctest -j $(nproc 2>/dev/null || sysctl -n hw.logicalcpu) --output-on-failure --rerun-failed
      env:
        ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
        UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
